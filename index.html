<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lebaran 2026 - Sularsito</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #0b1026; /* Langit Malam */
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden;
            position: relative;
        }

        /* --- Animasi Bintang Jatuh --- */
        .shooting-star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: shoot 4s linear infinite;
        }
        @keyframes shoot {
            0% { transform: translate(100vw, 0); opacity: 1; }
            20% { transform: translate(70vw, 30vh); opacity: 0; }
            100% { opacity: 0; }
        }

        /* --- Kartu Ucapan --- */
        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.5); 
            max-width: 380px; 
            width: 90%; 
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* --- Lampu Hias --- */
        .light-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; box-shadow: 0 0 10px currentColor; } to { opacity: 0.3; } }

        /* --- Foto & Kembang Api Menyala --- */
        .photo-wrapper { 
            position: relative; 
            width: 100%; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #eee;
        }
        .photo { width: 100%; display: block; border-radius: 15px; }
        
        /* Animasi Kembang Api di Atas Foto */
        .fw-overlay { 
            position: absolute; 
            width: 100px; /* Ukuran kembang api */
            height: 100px; 
            opacity: 0; 
            pointer-events: none;
            animation: explode-fw 3s infinite;
        }
        @keyframes explode-fw {
            0% { transform: scale(0.1) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: scale(1) rotate(20deg); opacity: 0.8; }
            100% { transform: scale(1.3) rotate(40deg); opacity: 0; }
        }

        h1 { color: #2c3e50; font-size: 1.5rem; margin: 15px 0 5px; }
        p { color: #7f8c8d; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
        .btn-play { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-play:hover { background: #219150; }
    </style>
</head>
<body>

    <div class="shooting-star" style="top: 10%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 30%; animation-delay: 2s;"></div>

    <div class="card">
        <div class="light-container">
            <span class="dot" style="color: #ff4757; background: #ff4757; animation-delay: 0s;"></span>
            <span class="dot" style="color: #eccc68; background: #eccc68; animation-delay: 0.2s;"></span>
            <span class="dot" style="color: #2ed573; background: #2ed573; animation-delay: 0.4s;"></span>
            <span class="dot" style="color: #1e90ff; background: #1e90ff; animation-delay: 0.6s;"></span>
        </div>

        <div class="photo-wrapper">
            <img src="family 2.jpg" class="photo" alt="Keluarga Sularsito">
            
            <img src="kembang-api.png" class="fw-overlay" style="top: -10%; left: -10%; animation-delay: 0s;">
            <img src="kembang-api.png" class="fw-overlay" style="top: 10%; right: -10%; animation-delay: 1.5s;">
            <img src="kembang-api.png" class="fw-overlay" style="bottom: 0%; left: 20%; animation-delay: 0.7s; width: 80px;">
        </div>
        
        <h1>Selamat Idul Fitri 1447 H</h1>
        <p>Mohon Maaf Lahir dan Batin.<br>Semoga keberkahan menyertai kita semua.<br><strong>Keluarga Sularsito</strong></p>

        <audio id="audioTakbir" src="Takbir.mpeg"></audio>
        <button class="btn-play" onclick="document.getElementById('audioTakbir').play()">
            <span>▶️</span> Putar Gema Takbir
        </button>
    </div>

</body>
</html>
